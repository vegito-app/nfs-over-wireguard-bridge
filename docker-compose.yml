services:
  server:
    build: .
    container_name: nfs-wireguard-bridge
    image: dbndev/nfs-wireguard-bridge
    privileged: true
    cap_add:
      - NET_ADMIN
    network_mode: bridge
    volumes:
      - ${NFS_WIREGUARD_BRIDGE_WORKSPACES:-/workspaces}:/workspaces:rw
      - ${NFS_WIREGUARD_BRIDGE_GITHUB_ACTIONS_RUNNER_WORK_DIR:-/runner}:/runner:rw
      - ./state:/state:rw
      - ./conf:/conf:rw
    ports:
      - "51820:51820/udp"
    restart: unless-stopped
    environment:
      - NFS_BACKEND=${NFS_BACKEND}
      - CODESPACES=${CODESPACES}
      - WG_SUBNET=${WG_SUBNET}
      - NFS_WIREGUARD_BRIDGE_SERVER_PORT=${NFS_WIREGUARD_BRIDGE_SERVER_PORT:-51820}
      - NFS_WIREGUARD_BRIDGE_SERVER_HOST=${NFS_WIREGUARD_BRIDGE_SERVER_HOST:-bbrodriguez.vegito.app}
